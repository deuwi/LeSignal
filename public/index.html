<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Le Signal — la veille dev de Deuwi</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="masthead">
    <div class="topline">
      <span class="kicker" id="t-kicker">VEILLE DEV · PAR DEUWI</span>
      <span class="controls">
        <button id="theme-btn" type="button">Sombre</button>
        <span class="sep">·</span>
        <span class="lang" id="lang">
          <button data-lang="fr" class="active">FR</button>
          <span class="sep">/</span>
          <button data-lang="en">EN</button>
        </span>
      </span>
    </div>
    <div class="rule-strong"></div>

    <h1 class="wordmark">Le Signal</h1>
    <p class="subtitle" id="t-subtitle">La veille dev. Le signal, pas le bruit.</p>

    <div class="edition">
      <span class="rule-thin"></span>
      <span id="t-edition">ÉDITION</span>
      <span class="rule-thin"></span>
    </div>

    <nav>
      <button data-tab="dev" class="active" data-i18n="nav_dev">La sélection</button>
      <button data-tab="deuwi" data-i18n="nav_deuwi">Atelier Deuwi</button>
    </nav>
    <div class="statusline" id="status"></div>
  </header>

  <main id="view"></main>

  <footer class="colophon">
    <div class="rule-strong"></div>
    <p class="method" id="t-method">Une passe quotidienne, dédoublonnée, sans chiffre non sourcé.</p>
    <p class="foot-links">veille.deuwi.xyz · <button class="foot-tab" data-tab="sources" data-i18n="nav_sources">Sources</button> · <button class="foot-tab" data-tab="reglages" data-i18n="nav_reglages">Réglages</button> · <span data-i18n="about">À propos</span> · LinkedIn</p>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
